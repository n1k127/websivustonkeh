<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Layout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        h2 {
            margin: 30px 0 15px;
            color: #555;
        }

        .responsive-container {
            display: flex;
            flex-wrap: wrap;
            background-color: #fff;
            border: 2px solid #ddd;
            border-radius: 8px;
            overflow: hidden;
        }

        .column {
            flex: 1;
            padding: 10px;
            background-color: #e3f2fd;
            border: 1px solid #90caf9;
            min-height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #1976d2;
        }

        @media (max-width: 600px) {
            .column {
                flex: 100%;
            }
        }

        .responsive-image {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .image-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            border: 2px solid #ddd;
        }

        .media-query-box {
      padding: 20px;
      text-align: center;
    }
    
    @media (max-width: 600px) {
      .media-query-box {
        background-color: lightcoral;
      }
    }
    
    @media (min-width: 601px) {
      .media-query-box {
        background-color: lightblue;
      }
    }
    .responsive-nav .nav-list {
      display: flex;
      list-style: none;
    }
    
    @media (max-width: 600px) {
      .responsive-nav .nav-list {
        display: none;
      }
    
      .responsive-nav .menu-toggle {
        display: block;
      }
    }
    </style>
</head>
<body>
    <h1>Responsive Design</h1>

    <h2>Task 1:</h2>
    <p style="margin-bottom: 15px; color: #666;">
     
    </p>
    <div class="responsive-container">
        <div class="column">Column 1</div>
        <div class="column">Column 2</div>
    </div>

    <h2>Responsive Image</h2>
    <p style="margin-bottom: 15px; color: #666;">
        
    </p>
    <div class="image-container">
        <img src="kissakuva.jpg" alt="Responsive Image" class="responsive-image">
    </div>

    <div style="margin-top: 30px; padding: 15px; background-color: #fff3cd; border: 1px solid #ffc107; border-radius: 5px;">
        
    </div>

    <div class="media-query-box">Resize the window to see the effect</div>

    <nav class="responsive-nav">
      <button class="menu-toggle">☰ Menu</button>
      <ul class="nav-list">
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>

</body>
</html>
